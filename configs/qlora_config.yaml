model:
  model_id: "Qwen/Qwen2.5-7B-Instruct"
  trust_remote_code: true

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"   # T4 — no bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/jinyong-qlora"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 2
  max_seq_length: 1024
  save_steps: 100
  save_total_limit: 3
  logging_steps: 10
  report_to: "none"
  fp16: true
  bf16: false
  packing: true
  eval_split_ratio: 0.05
  seed: 42

data:
  instruction_jsonl: "data/instructions/jinyong_sft.jsonl"
  raw_txt_dir: "data/raw"
  processed_txt_dir: "data/processed"

system_prompt: "你是一位精通金庸武侠风格的写作助手。"

